    <p><font color="#808000">原屬大房,生父虎豹先生,生母施正女士共生五男二女,家祿先生排行第四,長兄添旺(赴菲經商),二兄早逝三兄銘鍾,五弟早逝,大姐招治,二姐秀鳳(過繼王氏)生母因難產過世,生父因思念成疾相繼辭世,留下年幼四子女滯留台北乏人照顧,三房叔公振英先生,於心不忍,令媳收養家祿先生為天註之子,故家祿先生由大房過繼三房,先生時時以家中之台柱自許,刻刻以恢宏袓業為己任,雖千萬難亦往矣.</font></td>
